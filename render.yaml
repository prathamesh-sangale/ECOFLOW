services:
  - type: web
    name: ecoflow-backend
    env: node
    rootDir: .
    buildCommand: npm install && npx prisma generate --schema=apps/backend/prisma/schema.prisma && npm run build -w apps/backend
    startCommand: npm run start -w apps/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # You will paste your Supabase connection string directly in the Render dashboard
      - key: JWT_SECRET
        sync: false # You will paste your secret directly in the Render dashboard
